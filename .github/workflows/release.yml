name: Release

on:
  push:
    branches: [main]
  # Manual rebuild of an existing release's bundles (e.g. after a CI-only fix):
  # runs the build matrix against main HEAD and uploads to the given tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build and upload bundles for"
        required: false
      requested_by:
        description: "Repository requesting a release check"
        required: false
      requested_tag:
        description: "Counterpart release that requested this check"
        required: false

permissions:
  contents: read

jobs:
  # release-please opens/maintains a release PR from conventional commits; when
  # merged it cuts the GitHub release + tag and bumps package.json,
  # tauri.conf.json and Cargo.toml. We immediately mark the release a draft so
  # users don't see it until every platform bundle is attached.
  release-please:
    if: ${{ github.event_name == 'push' || inputs.tag == '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # A PAT (not the default GITHUB_TOKEN) so the release PR it opens
          # triggers CI — PRs created by GITHUB_TOKEN don't run workflows.
          token: ${{ secrets.GH_ACTIONS_PR_TOKEN }}
      - name: Mark release as draft while bundles build
        if: steps.release.outputs.release_created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: gh release edit "$TAG" --repo BlitterAmp/BlitterAmp --draft

  build:
    needs: release-please
    # Fires on a fresh release-please release, or a manual dispatch for an
    # existing tag (release-please is skipped then — always() lets this job
    # evaluate its own condition rather than being skipped along with it).
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || inputs.tag != '') }}
    strategy:
      fail-fast: false
      # Serialized: the three platforms share one updater manifest (latest.json)
      # on the release, so building one at a time avoids a read-modify-write race
      # on it. Releases are infrequent, so the extra wall-clock is fine.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest # arm64
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: blitteramp
          ref: ${{ needs.release-please.outputs.sha || inputs.tag }}
          fetch-depth: 0
      - name: Read pinned engine revision
        id: engine
        shell: bash
        run: |
          echo "sha=$(node -p "require('./blitteramp/src-tauri/blitterserver-version.json').sha")" >> "$GITHUB_OUTPUT"
          echo "tag=$(node -p "require('./blitteramp/src-tauri/blitterserver-version.json').tag")" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: BlitterAmp/BlitterServer
          path: blitterserver
          ref: ${{ steps.engine.outputs.sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: blitteramp/pnpm-lock.yaml
      - uses: actions/setup-go@v5
        with: { go-version-file: blitterserver/go.mod }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: blitteramp/src-tauri }

      - name: Linux deps (webkit + alsa for cpal)
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Build engine sidecar
        working-directory: blitteramp
        shell: bash
        env:
          BLITTERSERVER_DIR: ${{ github.workspace }}/blitterserver
          BLITTERSERVER_SHA: ${{ steps.engine.outputs.sha }}
          BLITTERSERVER_VERSION: ${{ steps.engine.outputs.tag }}
        run: |
          bash scripts/build-engine.sh ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: blitteramp
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (all platforms).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing + notarization (ignored on other platforms).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: blitteramp
          # Upload into the release-please release (or the dispatch tag). If the
          # release doesn't exist yet (e.g. a dispatch rebuild after cleanup),
          # releaseName lets the action create it; otherwise it finds it by tag
          # and merges this platform's bundles + latest.json.
          tagName: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
          releaseName: BlitterAmp v__VERSION__
          releaseBody: |
            See the assets below to download and install this version.

            Bundled BlitterServer commit: `${{ steps.engine.outputs.sha }}`.
            Compatible standalone BlitterServer release: `${{ steps.engine.outputs.tag || 'see the bundled commit' }}`.
          releaseDraft: true
          args: --target ${{ matrix.target }}

  # Publish the draft once every bundle is attached; delete it (and the tag) if
  # any platform failed, so the next fix commit recreates a clean release.
  # Skipped on workflow_dispatch (rebuilding an existing published release).
  finalize:
    needs: [release-please, build]
    if: ${{ always() && needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release (all bundles built)
        if: ${{ needs.build.result == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG" --repo BlitterAmp/BlitterAmp --draft=false
      - name: Retain draft for repair
        if: ${{ needs.build.result != 'success' }}
        run: exit 1

  request-server-release:
    needs: [release-please, finalize]
    if: needs.finalize.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Request a BlitterServer release check
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PR_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh api --method POST repos/BlitterAmp/BlitterServer/dispatches \
            -f event_type=blitteramp-released \
            -f "client_payload[requested_by]=BlitterAmp/BlitterAmp" \
            -f "client_payload[requested_tag]=$TAG"
