name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: blitteramp }
      - name: Read pinned engine revision
        id: engine
        shell: bash
        run: |
          echo "sha=$(node -p "require('./blitteramp/src-tauri/blitterserver-version.json').sha")" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: BlitterAmp/BlitterServer
          path: blitterserver
          ref: ${{ steps.engine.outputs.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with: { go-version-file: blitterserver/go.mod }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: blitteramp/src-tauri }
      - name: tauri linux deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf ffmpeg libasound2-dev
      - name: build engine sidecar
        working-directory: blitteramp
        env:
          BLITTERSERVER_DIR: ${{ github.workspace }}/blitterserver
          BLITTERSERVER_SHA: ${{ steps.engine.outputs.sha }}
        run: bash scripts/build-engine.sh
      - run: cargo check --manifest-path blitteramp/src-tauri/Cargo.toml
